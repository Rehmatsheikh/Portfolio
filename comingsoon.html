<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon</title>

<link rel="stylesheet" href="style.css">

<style>

/* Center page */

.comingsoon-page{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

}

/* Message Box */

.comingsoon-box{

background:rgba(0,0,0,0.35);

backdrop-filter:blur(6px);

border:1px solid rgba(255,255,255,0.2);

padding:60px;

border-radius:12px;

max-width:520px;

transition:0.35s;

}

/* Hover Effect (same style as other cards) */

.comingsoon-box:hover{

transform:translateY(-10px) scale(1.04);

box-shadow:0 15px 35px rgba(255,255,255,0.15);

border-color:rgba(255,255,255,0.4);

}

/* Title */

.comingsoon-box h1{

font-size:42px;

margin-bottom:15px;

}

/* Text */

.comingsoon-box p{

color:#ddd;

font-size:18px;

margin-bottom:35px;

line-height:1.7;

}

/* Button */

.back-btn{

display:inline-block;

padding:12px 28px;

background:white;

color:black;

text-decoration:none;

border-radius:25px;

font-weight:bold;

transition:0.3s;

}

/* Button Hover */

.back-btn:hover{

background:#ddd;

transform:scale(1.05);

}

</style>

</head>

<body>

<div class="comingsoon-page">

<div class="comingsoon-box">

<h1>Coming Soon ✨</h1>

<p>
The writer is currently working on this project.<br>
Books and songs will be published soon.
</p>

<a href="index.html" class="back-btn">Back to Portfolio</a>

</div>

</div>

</body>

</html>
